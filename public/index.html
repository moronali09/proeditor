<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PRO EDITOR</title>
  <style>
    :root{
      --bg:#f7f7fb;--card:#ffffff;--card2:#fbfbfe;--line:#e7e7ef;--text:#111111;--muted:#666a78;
      --accent:#3c0d88;--accent2:#411a5c;--danger:#111111;--shadow:0 12px 30px rgba(17,17,17,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#fff,#f4f4f8);color:var(--text)}
    .wrap{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
    .top{position:sticky;top:0;z-index:8;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
    .brand{font-weight:900;letter-spacing:.4px}
    .brand span{color:var(--accent)}
    .stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill,.badge,.tag{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 10px;font-size:12px;box-shadow:var(--shadow)}
    .avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#fff,#ece8ff);font-weight:800;cursor:pointer;border:1px solid var(--line);color:var(--accent)}
    .menu{position:absolute;right:0;top:44px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;display:none;min-width:150px}
    .menu.show{display:block}.menu button{width:100%;padding:10px 12px;border:0;background:#fff;text-align:left;cursor:pointer}.menu button:hover{background:#f3f0ff}
    .panel{padding:14px 16px 88px;flex:1}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px}
    .row,.actions,.switch{display:flex;gap:8px;align-items:center}
    .row{justify-content:space-between;flex-wrap:wrap}
    .actions{flex-wrap:wrap;margin-top:10px}
    .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(520px,100%);display:grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(18px)}
    .tab{padding:12px 8px;border:0;background:transparent;font-weight:700;color:#555;cursor:pointer}.tab.active{color:var(--accent)}.hidden{display:none!important}
    input,button,textarea{font:inherit}.btn,.ghost,.danger{border-radius:14px;padding:10px 14px;border:1px solid var(--line);cursor:pointer}
    .btn{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:800}.ghost{background:#fff;color:var(--text)}.danger{background:#111;color:#fff;border-color:#111}
    input,textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--text);outline:none}
    input:focus,textarea:focus{border-color:#c9bcff;box-shadow:0 0 0 3px rgba(111,60,255,.08)}
    .grid{display:grid;gap:10px}.small{font-size:12px;color:var(--muted)}.meta{display:flex;gap:10px;justify-content:space-between;color:var(--muted);font-size:12px;margin-top:6px}
    .thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:16px;border:1px solid var(--line);background:#f3f3f8}
    .post .title{font-weight:800;margin:10px 0 4px}.post .meta{margin-top:0}
    .range{width:100%}.leader,.ranktable{display:grid;gap:8px}.member,.rankrow{display:flex;justify-content:space-between;gap:10px;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff}
    .rankrow.active{outline:2px solid rgba(111,60,255,.16)}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;background:var(--accent)}
    .formgrid{display:grid;gap:10px}.preview{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:16px;border:1px solid var(--line);background:#f3f3f8}
    .modal{position:fixed;inset:0;background:rgba(17,17,17,.42);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}.modal.show{display:flex}
    .modalbox{width:min(520px,100%);background:#fff;border-radius:20px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}
    .toast{position:fixed;left:50%;bottom:82px;transform:translateX(-50%);background:#111;color:#fff;padding:10px 14px;border-radius:999px;display:none;z-index:30;box-shadow:var(--shadow)}
    .switch button{flex:1}.topwrap{position:relative}.chip{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#f2ecff;color:var(--accent);font-size:12px;font-weight:800}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">PRO <span>EDITOR</span></div>
      <div class="stats">
        <div class="pill hidden" id="rolePill">Member</div>
        <div class="pill hidden" id="memberPill">Members: 0</div>
        <div class="topwrap">
          <button class="avatar hidden" id="avatarBtn">U</button>
          <div class="menu" id="userMenu">
            <button id="profileBtn" class="hidden">Edit Profile</button>
            <button id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="app"></div>

    <div class="tabbar hidden" id="tabs">
      <button class="tab active" data-tab="feed" id="feedTabBtn">Feed</button>
      <button class="tab" data-tab="rank" id="rankTabBtn">Rank</button>
      <button class="tab hidden" data-tab="admin" id="adminTabBtn">Admin</button>
    </div>
  </div>

  <div class="modal" id="modal"><div class="modalbox" id="modalBox"></div></div>
  <div class="toast" id="toast"></div>

<script>
let me = null;
let state = { posts: [], rank: { name: 'F', color: '#555' }, top10Total: 0, counted: 0, membersCount: 0, leaderboard: [] };
let currentTab = 'feed';
const app = document.getElementById('app');
const tabs = document.getElementById('tabs');
const toastEl = document.getElementById('toast');
const modal = document.getElementById('modal');
const modalBox = document.getElementById('modalBox');
const rolePill = document.getElementById('rolePill');
const memberPill = document.getElementById('memberPill');
const avatarBtn = document.getElementById('avatarBtn');
const userMenu = document.getElementById('userMenu');
const profileBtn = document.getElementById('profileBtn');

function toast(msg){ toastEl.textContent = msg; toastEl.style.display = 'block'; clearTimeout(toast._t); toast._t = setTimeout(()=>toastEl.style.display='none', 1800); }
function showModal(html){ modalBox.innerHTML = html; modal.classList.add('show'); }
function closeModal(){ modal.classList.remove('show'); modalBox.innerHTML = ''; }
function initials(name){ return (name||'?').slice(0,2).toUpperCase(); }
async function api(url, method='GET', body=null, isForm=false){
  const opt = { method, credentials:'include', headers:{} };
  if(body){ if(isForm){ opt.body = body; } else { opt.headers['Content-Type']='application/json'; opt.body = JSON.stringify(body); } }
  const r = await fetch(url, opt);
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error || 'error');
  return data;
}
function setTabs(){ document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===currentTab)); }
function topUI(){
  rolePill.classList.remove('hidden'); memberPill.classList.remove('hidden'); avatarBtn.classList.remove('hidden'); tabs.classList.remove('hidden');
  rolePill.textContent = me.role === 'admin' ? 'Admin' : 'Member';
  memberPill.textContent = `Members: ${state.membersCount}`;
  avatarBtn.textContent = initials(me.username);
  document.getElementById('adminTabBtn').classList.toggle('hidden', me.role !== 'admin');
  profileBtn.classList.toggle('hidden', me.role !== 'member');
}
function loginView(){
  app.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0">Login</h2>
      <div class="switch"><button class="btn" id="memberTab">Member</button><button class="ghost" id="adminTab">Admin</button></div>
      <div style="height:12px"></div>
      <div class="grid">
        <input id="u" placeholder="username">
        <input id="p" type="password" placeholder="password">
        <button class="btn" id="go">Login</button>
        <button class="ghost" id="reg">Register</button>
      </div>
      <div class="small" style="margin-top:10px">fatema best editor then me </div>
    </div>`;
  let mode = 'member';
  const memberTab = document.getElementById('memberTab');
  const adminTab = document.getElementById('adminTab');
  const reg = document.getElementById('reg');
  const setMode = (m)=>{ mode=m; memberTab.className = m==='member' ? 'btn' : 'ghost'; adminTab.className = m==='admin' ? 'btn' : 'ghost'; reg.style.display = m==='member' ? 'block' : 'none'; };
  memberTab.onclick = ()=>setMode('member');
  adminTab.onclick = ()=>setMode('admin');
  setMode('member');
  document.getElementById('go').onclick = async()=>{
    try{
      await api('/api/auth/login','POST',{username:document.getElementById('u').value,password:document.getElementById('p').value});
      toast('Logged in');
      await boot();
    }catch(e){ toast(e.message); }
  };
  reg.onclick = ()=>{
    showModal(`
      <h3 style="margin-top:0">Register Member</h3>
      <div class="grid">
        <input id="ru" placeholder="username">
        <input id="rp" type="password" placeholder="password">
        <button class="btn" id="rs">Create account</button>
      </div>`);
    document.getElementById('rs').onclick = async()=>{
      try{
        await api('/api/auth/register','POST',{username:document.getElementById('ru').value,password:document.getElementById('rp').value});
        toast('Registered');
        closeModal();
        await boot();
      }catch(e){ toast(e.message); }
    };
  };
}
function rankRows(){
  const rows = [['SSR',650],['SS',550],['S',450],['A',350],['B',250],['C',150],['D',80],['F',0]];
  return rows.map(([n,m])=>`<div class="rankrow ${state.rank.name===n ? 'active' : ''}"><div><b>${n}</b> <span class="small">${m}+</span></div><div>${state.top10Total>=m ? '<span class="dot"></span>' : ''}</div></div>`).join('');
}
function leaderboardHtml(){
  return state.leaderboard.map((m, idx)=>`<div class="member"><div><b>#${idx+1} ${m.username}</b> ${m.kicked ? '<span class="tag">Kicked</span>' : ''}<div class="small">Rank ${m.rank} · ${m.top10Points} pts · Posts ${m.posts}</div></div><div><span class="chip">${m.rank}</span></div></div>`).join('');
}
function thumbSrc(p){ return p.thumbnailPath || p.thumbnailUrl || (p.videoPath ? p.videoPath : 'https://placehold.co/800x450/f4f4f8/111111?text=Preview'); }
function postCard(p){
  const voted = p.myVote !== null && p.myVote !== undefined;
  const media = p.videoPath ? `<video class="thumb" controls src="${p.videoPath}" poster="${thumbSrc(p)}"></video>` : `<img class="thumb" src="${thumbSrc(p)}">`;
  return `<div class="card post">
    ${p.isTop10 ? '<div class="badge">TOP 10</div>' : ''}
    ${media}
    <div class="title">${p.title} <span class="badge">${p.totalPoints} pts</span></div>
    <div class="meta"><span>By ${p.owner}</span><span>${p.voteCount} votes</span></div>
    ${voted ? `<div class="small">✓: ${p.myVote}/10</div>` : ''}
    ${me.role==='member' && me.username.toLowerCase()!==p.owner.toLowerCase() && !voted ? `<div class="actions"><div style="width:100%"><div class="small">Rate: <b><span id="sv-${p.id}">5</span>/10</b></div><input class="range" type="range" min="0" max="10" value="5" id="r-${p.id}" oninput="document.getElementById('sv-${p.id}').textContent=this.value"></div><button class="btn" onclick="votePost('${p.id}')">Vote</button></div>` : ''}
    ${(me.role==='admin' || me.username.toLowerCase()===p.owner.toLowerCase()) ? `<div class="actions"><button class="ghost" onclick="editPost('${p.id}')">Edit</button><button class="danger" onclick="delPost('${p.id}')">Delete</button></div>` : ''}
  </div>`;
}
async function createThumbnailFileFromVideo(file){
  return new Promise((resolve, reject)=>{
    const video = document.createElement('video');
    const url = URL.createObjectURL(file);
    video.preload = 'metadata'; video.src = url; video.muted = true; video.playsInline = true;
    video.onloadeddata = ()=>{ try{ video.currentTime = Math.min(1, (video.duration || 2) / 2); }catch{} };
    video.onseeked = ()=>{
      try{
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 1280; canvas.height = video.videoHeight || 720;
        const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob)=>{ URL.revokeObjectURL(url); if(!blob) return reject(new Error('thumbnail failed')); resolve(new File([blob], `thumb-${Date.now()}.jpg`, { type:'image/jpeg' })); }, 'image/jpeg', 0.88);
      }catch(err){ URL.revokeObjectURL(url); reject(err); }
    };
    video.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('video preview failed')); };
  });
}
function postForm(post={}){
  return `
    <h3 style="margin-top:0">${post.id ? 'Edit Post' : 'New Post'}</h3>
    <div class="grid">
      <input id="ptitle" placeholder="title" value="${post.title || ''}">
      <input id="purl" placeholder="thumbnail url" value="${post.thumbnailUrl || ''}">
      <input id="pvideo" type="file" accept="video/*">
      <input id="pthumb" type="file" accept="image/*">
      <img class="preview" id="thumbPreview" src="${thumbSrc(post)}">
      <div class="small">Thumbnail file na dile video theke auto thumbnail hobe</div>
      <button class="btn" id="savePost">Save</button>
    </div>`;
}
async function openPostModal(post={}){
  showModal(postForm(post));
  const pvideo = document.getElementById('pvideo');
  const pthumb = document.getElementById('pthumb');
  const purl = document.getElementById('purl');
  const preview = document.getElementById('thumbPreview');
  const refresh = async()=>{
    const thumbFile = pthumb.files?.[0];
    const videoFile = pvideo.files?.[0];
    const url = purl.value.trim();
    if(thumbFile){ preview.src = URL.createObjectURL(thumbFile); return; }
    if(url){ preview.src = url; return; }
    if(videoFile){ preview.src = URL.createObjectURL(videoFile); return; }
    preview.src = thumbSrc(post);
  };
  pvideo.onchange = refresh; pthumb.onchange = refresh; purl.oninput = refresh; refresh();
  document.getElementById('savePost').onclick = async()=>{
    try{
      const title = document.getElementById('ptitle').value.trim();
      const thumbnailUrl = purl.value.trim();
      const videoFile = pvideo.files?.[0];
      const thumbFile = pthumb.files?.[0];
      const fd = new FormData();
      fd.append('title', title);
      fd.append('thumbnailUrl', thumbnailUrl);
      if(videoFile) fd.append('video', videoFile);
      if(thumbFile) fd.append('thumbnailFile', thumbFile);
      else if(!thumbnailUrl && videoFile) fd.append('thumbnailFile', await createThumbnailFileFromVideo(videoFile));
      await api(post.id ? `/api/posts/${post.id}` : '/api/posts', post.id ? 'PUT' : 'POST', fd, true);
      toast(post.id ? 'Updated' : 'Posted');
      closeModal();
      await boot(false);
    }catch(e){ toast(e.message); }
  };
}
function profileForm(){
  return `
    <h3 style="margin-top:0">Edit Profile</h3>
    <div class="grid">
      <input id="newUsername" placeholder="new username" value="${me.username}">
      <input id="currentPassword" type="password" placeholder="current password">
      <input id="newPassword" type="password" placeholder="new password">
      <button class="btn" id="saveProfile">Save</button>
      <div class="small">Username ba password change korte paro. Admin er jonno option nai.</div>
    </div>`;
}
function openProfile(){
  showModal(profileForm());
  document.getElementById('saveProfile').onclick = async()=>{
    try{
      await api('/api/auth/profile','POST',{
        currentPassword: document.getElementById('currentPassword').value,
        newUsername: document.getElementById('newUsername').value,
        newPassword: document.getElementById('newPassword').value,
      });
      toast('Profile updated');
      closeModal();
      await boot();
    }catch(e){ toast(e.message); }
  };
}
async function votePost(id){ try{ await api(`/api/posts/${id}/rate`,'POST',{rating:Number(document.getElementById('r-'+id).value)}); toast('Voted'); await boot(false); }catch(e){ toast(e.message); } }
async function delPost(id){ if(!confirm('Delete?')) return; try{ await api(`/api/posts/${id}`,'DELETE'); toast('Deleted'); await boot(false); }catch(e){ toast(e.message); } }
async function editPost(id){ const p = state.posts.find(x=>x.id===id); if(!p) return; openPostModal(p); }
async function addPost(){ openPostModal({}); }
async function adminPanel(){
  const { members } = await api('/api/admin/members');
  const { posts } = await api('/api/admin/posts');
  app.innerHTML = `
    <div class="card"><button class="btn" onclick="addPost()">+ Add Post</button></div>
    <div class="card"><h3 style="margin-top:0">Members</h3>${members.map(m=>`<div class="member"><div><b>${m.username}</b> ${m.role==='admin' ? '<span class="tag">Admin</span>' : ''} ${m.kicked ? '<span class="tag">Kicked</span>' : ''}<div class="small">Rank ${m.rank} · ${m.top10Points} pts · Posts ${m.postCount}</div></div><div style="min-width:126px;display:grid;gap:6px">${m.role!=='admin'?`<button class="ghost" onclick="toggleKick('${m.username}', ${m.kicked})">${m.kicked ? 'Restore' : 'Kick'}</button><button class="danger" onclick="deleteMember('${m.username}')">Delete</button>`:''}</div></div>`).join('')}</div>
    <div class="card"><h3 style="margin-top:0">Posts</h3>${posts.map(postCard).join('')}</div>`;
}
async function toggleKick(u, kicked){ try{ await api(`/api/admin/members/${encodeURIComponent(u)}/${kicked ? 'restore' : 'kick'}`,'POST'); toast('Saved'); await boot(false); }catch(e){ toast(e.message); } }
async function deleteMember(u){ if(!confirm('Delete member?')) return; try{ await api(`/api/admin/members/${encodeURIComponent(u)}`,'DELETE'); toast('Deleted'); await boot(false); }catch(e){ toast(e.message); } }
function render(){
  if(!me){ loginView(); return; }
  topUI();
  setTabs();
  profileBtn.onclick = ()=>{ userMenu.classList.remove('show'); openProfile(); };
  if(currentTab === 'admin' && me.role === 'admin') return adminPanel();
  if(currentTab === 'rank'){
    app.innerHTML = `
      <div class="card">
        <div class="row">
          <div><div class="small">Total Points</div><div style="font-size:28px;font-weight:900">${state.top10Total}</div></div>
          <div><div class="small">Current Rank</div><div class="badge" style="background:${state.rank.color}12;border-color:${state.rank.color}44;color:${state.rank.color};font-weight:900">${state.rank.name}</div></div>
        </div>
        <div class="meta" style="margin-top:10px"><span>Videos Counted (up to 10)</span><span>${state.counted}/10</span></div>
        <div class="meta" style="margin-top:6px"><span>Members</span><span>${state.membersCount}</span></div>
        <div class="small" style="margin-top:8px">4-5 video thakleo rank hobe; 10 porjonto best videos count hoy</div>
      </div>
      <div class="card"><h3 style="margin-top:0">Rank Table</h3><div class="ranktable">${rankRows()}</div></div>
      <div class="card"><h3 style="margin-top:0">Member Leaderboard</h3><div class="leader">${leaderboardHtml()}</div></div>`;
    return;
  }
  const sorted = [...state.posts].sort((a,b)=>b.totalPoints-a.totalPoints || new Date(b.createdAt)-new Date(a.createdAt));
  app.innerHTML = `<div class="card"><button class="btn" onclick="addPost()">+ Add Post</button><div class="small" style="margin-top:8px">Video upload, thumbnail file/url, auto thumbnail</div></div>${sorted.map(postCard).join('')}`;
}
async function boot(){
  const x = await fetch('/api/me').then(r=>r.json());
  me = x.user;
  if(!me){ render(); return; }
  const d = await api('/api/dashboard');
  state.posts = d.posts;
  state.rank = d.rank;
  state.top10Total = d.top10Total;
  state.counted = d.counted;
  state.membersCount = d.membersCount;
  state.leaderboard = d.leaderboard;
  render();
}
avatarBtn.addEventListener('click', ()=> userMenu.classList.toggle('show'));
document.addEventListener('click', e=>{ if(!avatarBtn.contains(e.target) && !userMenu.contains(e.target)) userMenu.classList.remove('show'); });
document.getElementById('logoutBtn').onclick = async()=>{ try{ await api('/api/auth/logout','POST'); }catch{} me=null; state={posts:[], rank:{name:'F',color:'#555'}, top10Total:0, counted:0, membersCount:0, leaderboard:[]}; userMenu.classList.remove('show'); render(); toast('Logged out'); };
document.getElementById('tabs').addEventListener('click', e=>{ if(!e.target.classList.contains('tab')) return; currentTab = e.target.dataset.tab; setTabs(); render(); });
window.addPost = addPost;
window.votePost = votePost;
window.editPost = editPost;
window.delPost = delPost;
window.toggleKick = toggleKick;
window.deleteMember = deleteMember;
boot();
</script>
</body>
</html>
